    <style>
        body {
            background-color: #f3e5ab;
            font-family: Arial, sans-serif;
            color: #2b1d0e;
            text-align: center;
            padding: 20px;
            font-size: 1.2em;
        }
        h1 {
            color: #4b2e13;
            font-size: 2.5em;
        }
        .category-title {
            color: #4b2e13;
            font-size: 1.8em;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid #8b5a2b;
            padding-bottom: 5px;
        }
        .menu {
            margin: 0 auto;
            max-width: 800px;
            padding: 20px;
            background-color: #d2b48c;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
        }
        .category-container {
            margin-bottom: 20px;
        }
        .menu-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        .menu-item {
            padding: 15px 10px;
            background-color: #8b5a2b;
            border-radius: 5px;
            cursor: pointer;
            color: #ffffff;
            font-size: 1.1em;
            transition: all 0.3s ease;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-item:hover {
            background-color: #c19a6b;
            color: #2b1d0e;
            transform: translateY(-3px);
        }
        .menu-item.games {
            background-color: #8b5a2b;
        }
        .menu-item.utilities {
            background-color: #5a8b2b;
        }
        .menu-item.tools {
            background-color: #2b5a8b;
        }
        .tab-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .tab {
            padding: 10px 20px;
            background-color: #b38b59;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
        }
        .tab:hover {
            background-color: #c19a6b;
        }
        .tab.active {
            background-color: #8b5a2b;
        }
        .search-container {
            margin: 20px 0;
        }
        #searchInput {
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: 1px solid #8b5a2b;
            font-size: 1em;
        }
    </style>
</head>

        // Function to generate the menu based on category
        function generateMenu(category = 'all') {
            const menu = document.getElementById('gamesMenu');
            menu.innerHTML = "";
            
            // Get filtered items
            let filteredItems;
            if (category === 'all') {
                filteredItems = items;
            } else {
                filteredItems = items.filter(item => item.category === category);
            }
            
            // Create categories object to group items
            const categories = {};
            filteredItems.forEach(item => {
                if (!categories[item.category]) {
                    categories[item.category] = [];
                }
                categories[item.category].push(item);
            });
            
            // Create menu sections for each category
            for (const [category, categoryItems] of Object.entries(categories)) {
                const categoryContainer = document.createElement('div');
                categoryContainer.className = 'category-container';
                
                // Create category title with first letter uppercase
                const categoryTitle = document.createElement('h2');
                categoryTitle.className = 'category-title';
                categoryTitle.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                categoryContainer.appendChild(categoryTitle);
                
                // Create grid container for items
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'menu-items';
                
                // Add items to container
                categoryItems.forEach(item => {
                    const menuItem = document.createElement('div');
                    menuItem.className = `menu-item ${item.category}`;
                    menuItem.textContent = item.name;
                    menuItem.onclick = () => {
                        window.location.href = item.path;
                    };
                    itemsContainer.appendChild(menuItem);
                });
                
                categoryContainer.appendChild(itemsContainer);
                menu.appendChild(categoryContainer);
            }
        }

        // Function to filter by category
        function filterCategory(category) {
            // Update active tab
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Generate menu with filtered category
            generateMenu(category);
        }
        
        // Function to implement search
        function implementSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                
                // If search term is empty, reset to showing all items
                if (searchTerm === '') {
                    generateMenu('all');
                    return;
                }
                
                // Filter items based on search term
                const filteredItems = items.filter(item => 
                    item.name.toLowerCase().includes(searchTerm)
                );
                
                // Create categories object to group filtered items
                const categories = {};
                filteredItems.forEach(item => {
                    if (!categories[item.category]) {
                        categories[item.category] = [];
                    }
                    categories[item.category].push(item);
                });
                
                // Update menu with filtered items
                const menu = document.getElementById('gamesMenu');
                menu.innerHTML = "";
                
                // If no results found
                if (filteredItems.length === 0) {
                    menu.innerHTML = "<p>No items found matching your search.</p>";
                    return;
                }
                
                // Create menu sections for each category
                for (const [category, categoryItems] of Object.entries(categories)) {
                    const categoryContainer = document.createElement('div');
                    categoryContainer.className = 'category-container';
                    
                    // Create category title with first letter uppercase
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                    categoryContainer.appendChild(categoryTitle);
                    
                    // Create grid container for items
                    const itemsContainer = document.createElement('div');
                    itemsContainer.className = 'menu-items';
                    
                    // Add items to container
                    categoryItems.forEach(item => {
                        const menuItem = document.createElement('div');
                        menuItem.className = `menu-item ${item.category}`;
                        menuItem.textContent = item.name;
                        menuItem.onclick = () => {
                            window.location.href = item.path;
                        };
                        itemsContainer.appendChild(menuItem);
                    });
                    
                    categoryContainer.appendChild(itemsContainer);
                    menu.appendChild(categoryContainer);
                }
            });
        }

        // Generate the menu when the page loads
        window.onload = function() {
            generateMenu();
            implementSearch();
        };
