<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBiz Projects</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { 
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .project-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .project-card h3 {
            color: #333;
            margin-top: 0;
        }
        .project-card p {
            color: #666;
            margin-bottom: 15px;
        }
        .project-link {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .project-link:hover {
            background: #5a67d8;
        }
        .empty-state {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <h1>📁 My Projects</h1>
        
        <div class="empty-state">
            <h3>🚧 Coming Soon!</h3>
            <p>This is where your awesome projects will be displayed.</p>
            <p>Create new project folders in <code>/home/opc/ProBiz/websites/</code> and they'll appear here automatically.</p>
        </div>

        <!-- Example project structure - uncomment when you have actual projects -->

                <h3>🎮 My First Game</h3>

                <a href="/project1/" class="project-link">View Project</a>
            </div>
            
            <div class="project-card">
                <h3>💼 Business Website</h3>
                <p>A professional website template</p>
                <a href="/project2/" class="project-link">View Project</a>
            </div>
        </div>
        -->
    </div>
</body>
</html>
