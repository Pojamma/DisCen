   <title>Animal Sounds Match Game</title>
 </head>

        <div class="overlay" id="overlay" style="display: none;">
            <img id="event-image" src="" alt="Event Image">
        </div>        
        <br>
        <br>
        <div class="grid">
            <!-- Dynamic card elements will be added here using JavaScript -->
        </div>
        <center>
        <button id="reset-button">Reset Game</button>
        <button id="reset-sound-button">Stop Sound</button>
        </center>
    </div>
    <script src="scripts.js"></script> <!-- Link to external JavaScript file for game logic -->
