<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Baloo 2', cursive;
            background-image: url('images/background.jpg');
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 10px 0;
        }
        #title {
            color: #4A90E2;
            font-size: 3em;
            margin: 10px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 8px 15px;
            border-radius: 10px;
        }
        #container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #drawingPanel {
            width: 500px;
            height: 650px;
            background-color: white;
            border: 2px solid #000;
            position: relative;
            touch-action: none;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            height: 650px;
            justify-content: space-around;
            padding: 10px;
        }
        .draggable {
            width: 100px;
            height: 100px;
            cursor: grab;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
        #controls {
            margin-top: 15px;
        }
        .button {
            font-size: 1.5em;
            cursor: pointer;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div id="title">Scribble</div>
    <div id="container">
        <div class="sidebar" id="leftSidebar">
            <div class="draggable" style="background-image: url('images/pic1.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic2.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic3.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic4.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic9.png');"></div>
            <div class="draggable" style="background-image: url('images/pic10.png');"></div>
        </div>
        <div id="drawingPanel">
            <canvas id="canvas" width="500" height="650"></canvas>
        </div>
        <div class="sidebar" id="rightSidebar">
            <div class="draggable" style="background-image: url('images/pic5.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic6.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic7.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic8.jpg');"></div>
            <div class="draggable" style="background-image: url('images/pic11.png');"></div>
            <div class="draggable" style="background-image: url('images/pic12.png');"></div>
        </div>
    </div>
    <div id="controls">
        <input type="color" id="colorPicker" value="#000000" style="margin-right: 20px;">
        <i class="fas fa-trash button" onclick="clearCanvas()"></i>
        <i class="fas fa-undo button" onclick="undoLast()"></i>
        <i class="fas fa-redo button" onclick="redoLast()"></i>
    </div>
    <script src="app.js"></script>
</body>
</html>
