<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Kids Drawing Pad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #a8e6cf);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 0 0 20px 20px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #ff6b9d;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 0;
        }

        .main-container {
            display: flex;
            flex: 1;
            gap: 15px;
            padding: 0 15px 15px;
            max-height: calc(100vh - 120px);
        }

        .toolbar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
            max-width: 250px;
            overflow-y: auto;
        }

        .tool-section {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 15px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }

        .tool-section h3 {
            color: #5a5a5a;
            margin-bottom: 10px;
            font-size: 1.1em;
            text-align: center;
        }

        .colors {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .color-btn.active {
            border-color: #333;
            border-width: 4px;
            transform: scale(1.1);
        }

        .tools {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .tool-btn {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tool-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .tool-btn.active {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            transform: scale(1.05);
        }

        .brush-tool { background: linear-gradient(45deg, #4ecdc4, #44a08d) !important; }
        .eraser-tool { background: linear-gradient(45deg, #fd746c, #ff9068) !important; }
        .fill-tool { background: linear-gradient(45deg, #a8e6cf, #88d8a3) !important; }
        .line-tool { background: linear-gradient(45deg, #ffd3a5, #fd9853) !important; }
        .circle-tool { background: linear-gradient(45deg, #667eea, #764ba2) !important; }
        .square-tool { background: linear-gradient(45deg, #f093fb, #f5576c) !important; }

        .size-control {
            text-align: center;
        }

        .size-slider {
            width: 100%;
            margin: 10px 0;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(to right, #667eea, #764ba2);
            outline: none;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #ff6b9d;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .size-preview {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            border: 2px dashed #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.5);
        }

        .size-dot {
            background: #333;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .clear-btn {
            background: linear-gradient(45deg, #ff9068, #fd746c);
        }

        .undo-btn {
            background: linear-gradient(45deg, #ffecd2, #fcb69f);
            color: #333;
            text-shadow: none;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .canvas-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            border: 5px solid #fff;
        }

        #drawingCanvas {
            display: block;
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #ff6b9d;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            .toolbar {
                flex-direction: row;
                overflow-x: auto;
                min-width: auto;
                max-width: none;
                padding: 10px;
            }
            
            .tool-section {
                min-width: 200px;
                flex-shrink: 0;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }

        .rainbow-btn {
            background: linear-gradient(45deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #7700ff, #ff00ff) !important;
            animation: rainbowShift 2s linear infinite;
        }

        @keyframes rainbowShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 My Drawing Pad 🌈</h1>
    </div>

    <div class="main-container">
        <div class="toolbar">
            <div class="tool-section">
                <h3>🎨 Colors</h3>
                <div class="colors">
                    <div class="color-btn active" style="background: #000000" data-color="#000000"></div>
                    <div class="color-btn" style="background: #ff0000" data-color="#ff0000"></div>
                    <div class="color-btn" style="background: #00ff00" data-color="#00ff00"></div>
                    <div class="color-btn" style="background: #0000ff" data-color="#0000ff"></div>
                    <div class="color-btn" style="background: #ffff00" data-color="#ffff00"></div>
                    <div class="color-btn" style="background: #ff00ff" data-color="#ff00ff"></div>
                    <div class="color-btn" style="background: #00ffff" data-color="#00ffff"></div>
                    <div class="color-btn" style="background: #ffa500" data-color="#ffa500"></div>
                    <div class="color-btn" style="background: #800080" data-color="#800080"></div>
                    <div class="color-btn" style="background: #ffc0cb" data-color="#ffc0cb"></div>
                    <div class="color-btn" style="background: #8b4513" data-color="#8b4513"></div>
                    <div class="color-btn" style="background: #808080" data-color="#808080"></div>
                </div>
                <button class="tool-btn rainbow-btn" id="rainbowMode">🌈 Rainbow</button>
            </div>

            <div class="tool-section">
                <h3>🛠️ Tools</h3>
                <div class="tools">
                    <button class="tool-btn brush-tool active" data-tool="brush">🖌️ Brush</button>
                    <button class="tool-btn eraser-tool" data-tool="eraser">🧽 Eraser</button>
                    <button class="tool-btn fill-tool" data-tool="fill">🪣 Fill</button>
                    <button class="tool-btn line-tool" data-tool="line">📏 Line</button>
                    <button class="tool-btn circle-tool" data-tool="circle">⭕ Circle</button>
                    <button class="tool-btn square-tool" data-tool="square">⬜ Square</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>📏 Brush Size</h3>
                <div class="size-control">
                    <input type="range" class="size-slider" id="brushSize" min="1" max="50" value="5">
                    <div class="size-preview">
                        <div class="size-dot" id="sizePreview"></div>
                    </div>
                    <div id="sizeLabel">Size: 5px</div>
                </div>
            </div>

            <div class="tool-section">
                <h3>🎮 Actions</h3>
                <div class="action-buttons">
                    <button class="action-btn undo-btn" id="undoBtn">↶ Undo</button>
                    <button class="action-btn clear-btn" id="clearBtn">🗑️ Clear All</button>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="drawingCanvas"></canvas>
            <div class="loading-overlay" id="loadingOverlay">
                <div>🎨 Loading...</div>
            </div>
        </div>
    </div>

    <script>
        class KidsDrawingPad {
            constructor() {
                this.canvas = document.getElementById('drawingCanvas');
                if (!this.canvas) {
                    console.error('Canvas element not found!');
                    return;
                }
                
                this.ctx = this.canvas.getContext('2d');
                this.isDrawing = false;
                this.currentTool = 'brush';
                this.currentColor = '#000000';
                this.brushSize = 5;
                this.isRainbowMode = false;
                this.rainbowHue = 0;
                this.undoStack = [];
                this.maxUndoSteps = 10;
                
                // Shape drawing variables
                this.startX = 0;
                this.startY = 0;
                this.isDrawingShape = false;
                this.tempCanvas = null;
                this.tempCtx = null;

                this.init();
            }

            init() {
                // Wait a moment to ensure DOM is fully rendered
                setTimeout(() => {
                    this.resizeCanvas();
                    this.setupEventListeners();
                    this.updateSizePreview();
                    
                    // Create and properly initialize temporary canvas for shape preview
                    this.tempCanvas = document.createElement('canvas');
                    this.tempCanvas.width = this.canvas.width;
                    this.tempCanvas.height = this.canvas.height;
                    this.tempCtx = this.tempCanvas.getContext('2d');
                    this.tempCtx.lineCap = 'round';
                    this.tempCtx.lineJoin = 'round';
                    
                    this.saveState();
                    
                    window.addEventListener('resize', () => this.resizeCanvas());
                }, 100);
            }

            resizeCanvas() {
                if (!this.canvas) return;
                
                const container = this.canvas.parentElement;
                if (!container) {
                    console.error('Canvas container not found!');
                    return;
                }
                
                const rect = container.getBoundingClientRect();
                
                // Make sure we have valid dimensions
                if (rect.width > 0 && rect.height > 0) {
                    // Save current canvas content before resize
                    const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                    
                    this.canvas.width = Math.max(rect.width - 10, 300);
                    this.canvas.height = Math.max(rect.height - 10, 200);
                    
                    // Set canvas context properties
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    
                    // Restore canvas content if we had any
                    if (imageData && imageData.width > 0 && imageData.height > 0) {
                        this.ctx.putImageData(imageData, 0, 0);
                    }
                    
                    // Recreate temp canvas with proper dimensions
                    if (this.tempCanvas) {
                        this.tempCanvas.width = this.canvas.width;
                        this.tempCanvas.height = this.canvas.height;
                        this.tempCtx = this.tempCanvas.getContext('2d');
                        this.tempCtx.lineCap = 'round';
                        this.tempCtx.lineJoin = 'round';
                    }
                }
            }

            setupEventListeners() {
                // Color selection
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const activeColor = document.querySelector('.color-btn.active');
                        if (activeColor) {
                            activeColor.classList.remove('active');
                        }
                        e.target.classList.add('active');
                        this.currentColor = e.target.dataset.color;
                        this.isRainbowMode = false;
                        const rainbowBtn = document.getElementById('rainbowMode');
                        if (rainbowBtn) {
                            rainbowBtn.classList.remove('active');
                        }
                    });
                });

                // Rainbow mode
                const rainbowBtn = document.getElementById('rainbowMode');
                if (rainbowBtn) {
                    rainbowBtn.addEventListener('click', (e) => {
                        this.isRainbowMode = !this.isRainbowMode;
                        e.target.classList.toggle('active');
                        if (this.isRainbowMode) {
                            const activeColor = document.querySelector('.color-btn.active');
                            if (activeColor) {
                                activeColor.classList.remove('active');
                            }
                        }
                    });
                }

                // Tool selection
                document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const activeTool = document.querySelector('.tool-btn.active');
                        if (activeTool) {
                            activeTool.classList.remove('active');
                        }
                        e.target.classList.add('active');
                        this.currentTool = e.target.dataset.tool;
                        this.updateCursor();
                    });
                });

                // Brush size
                const sizeSlider = document.getElementById('brushSize');
                if (sizeSlider) {
                    sizeSlider.addEventListener('input', (e) => {
                        this.brushSize = parseInt(e.target.value);
                        this.updateSizePreview();
                    });
                }

                // Action buttons
                const clearBtn = document.getElementById('clearBtn');
                const undoBtn = document.getElementById('undoBtn');
                
                if (clearBtn) {
                    clearBtn.addEventListener('click', () => this.clearCanvas());
                }
                if (undoBtn) {
                    undoBtn.addEventListener('click', () => this.undo());
                }

                // Canvas events
                this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                this.canvas.addEventListener('mouseup', () => this.stopDrawing());
                this.canvas.addEventListener('mouseout', () => this.stopDrawing());

                // Touch events
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.canvas.dispatchEvent(mouseEvent);
                });

                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousemove', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.canvas.dispatchEvent(mouseEvent);
                });

                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const mouseEvent = new MouseEvent('mouseup', {});
                    this.canvas.dispatchEvent(mouseEvent);
                });
            }

            getMousePos(e) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }

            startDrawing(e) {
                const pos = this.getMousePos(e);
                
                if (this.currentTool === 'fill') {
                    // For fill tool, don't set isDrawing to prevent line drawing
                    this.floodFill(pos.x, pos.y);
                    return;
                }
                
                this.isDrawing = true;

                if (['line', 'circle', 'square'].includes(this.currentTool)) {
                    this.isDrawingShape = true;
                    this.startX = pos.x;
                    this.startY = pos.y;
                    
                    // Ensure temp canvas is properly sized and initialized
                    if (!this.tempCanvas || this.tempCanvas.width !== this.canvas.width || this.tempCanvas.height !== this.canvas.height) {
                        this.tempCanvas = document.createElement('canvas');
                        this.tempCanvas.width = this.canvas.width;
                        this.tempCanvas.height = this.canvas.height;
                        this.tempCtx = this.tempCanvas.getContext('2d');
                    }
                    
                    // Clear temp canvas and copy current drawing
                    this.tempCtx.clearRect(0, 0, this.tempCanvas.width, this.tempCanvas.height);
                    this.tempCtx.drawImage(this.canvas, 0, 0);
                    return;
                }

                this.ctx.beginPath();
                this.ctx.moveTo(pos.x, pos.y);
                
                if (this.currentTool === 'brush') {
                    this.draw(e);
                }
            }

            draw(e) {
                if (!this.isDrawing || this.currentTool === 'fill') return;

                const pos = this.getMousePos(e);

                if (this.isDrawingShape) {
                    this.drawShapePreview(pos.x, pos.y);
                    return;
                }

                this.ctx.lineWidth = this.brushSize;
                
                if (this.currentTool === 'brush') {
                    if (this.isRainbowMode) {
                        this.ctx.strokeStyle = `hsl(${this.rainbowHue}, 100%, 50%)`;
                        this.rainbowHue = (this.rainbowHue + 2) % 360;
                    } else {
                        this.ctx.strokeStyle = this.currentColor;
                    }
                    this.ctx.globalCompositeOperation = 'source-over';
                } else if (this.currentTool === 'eraser') {
                    this.ctx.globalCompositeOperation = 'destination-out';
                }

                this.ctx.lineTo(pos.x, pos.y);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo(pos.x, pos.y);
            }

            drawShapePreview(endX, endY) {
                // Safety check for temp canvas
                if (!this.tempCanvas || !this.tempCtx) {
                    return;
                }
                
                // Clear main canvas and restore the saved state
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.tempCanvas, 0, 0);
                
                // Save current context state
                this.ctx.save();
                
                // Set drawing properties
                this.ctx.lineWidth = this.brushSize;
                this.ctx.strokeStyle = this.isRainbowMode ? `hsl(${this.rainbowHue}, 100%, 50%)` : this.currentColor;
                this.ctx.globalCompositeOperation = 'source-over';
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';

                const width = endX - this.startX;
                const height = endY - this.startY;

                this.ctx.beginPath();
                
                switch (this.currentTool) {
                    case 'line':
                        this.ctx.moveTo(this.startX, this.startY);
                        this.ctx.lineTo(endX, endY);
                        break;
                    case 'circle':
                        const radius = Math.sqrt(width * width + height * height);
                        this.ctx.arc(this.startX, this.startY, radius, 0, 2 * Math.PI);
                        break;
                    case 'square':
                        this.ctx.rect(this.startX, this.startY, width, height);
                        break;
                }
                
                this.ctx.stroke();
                
                // Restore context state
                this.ctx.restore();
            }

            stopDrawing() {
                if (!this.isDrawing) return;
                
                this.isDrawing = false;
                this.isDrawingShape = false;
                this.ctx.globalCompositeOperation = 'source-over';
                this.saveState();
            }

            floodFill(x, y) {
                // Make sure coordinates are integers and within bounds
                x = Math.floor(x);
                y = Math.floor(y);
                
                if (x < 0 || x >= this.canvas.width || y < 0 || y >= this.canvas.height) {
                    return;
                }
                
                const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                const targetColor = this.getPixelColor(imageData, x, y);
                
                // Handle rainbow mode or regular color
                let fillColor;
                if (this.isRainbowMode) {
                    // Use current rainbow hue
                    fillColor = this.hslToRgba(this.rainbowHue, 100, 50);
                    this.rainbowHue = (this.rainbowHue + 10) % 360; // Advance hue for next use
                } else {
                    fillColor = this.hexToRgba(this.currentColor);
                }
                
                // Don't fill if target and fill colors are the same
                if (this.colorsEqual(targetColor, fillColor)) return;
                
                this.saveState();
                this.floodFillRecursive(imageData, x, y, targetColor, fillColor);
                this.ctx.putImageData(imageData, 0, 0);
            }

            hslToRgba(h, s, l) {
                h = h % 360;
                s = s / 100;
                l = l / 100;
                
                const c = (1 - Math.abs(2 * l - 1)) * s;
                const x = c * (1 - Math.abs((h / 60) % 2 - 1));
                const m = l - c / 2;
                
                let r, g, b;
                
                if (0 <= h && h < 60) {
                    r = c; g = x; b = 0;
                } else if (60 <= h && h < 120) {
                    r = x; g = c; b = 0;
                } else if (120 <= h && h < 180) {
                    r = 0; g = c; b = x;
                } else if (180 <= h && h < 240) {
                    r = 0; g = x; b = c;
                } else if (240 <= h && h < 300) {
                    r = x; g = 0; b = c;
                } else {
                    r = c; g = 0; b = x;
                }
                
                return {
                    r: Math.round((r + m) * 255),
                    g: Math.round((g + m) * 255),
                    b: Math.round((b + m) * 255),
                    a: 255
                };
            }

            floodFillRecursive(imageData, startX, startY, targetColor, fillColor) {
                const stack = [{x: startX, y: startY}];
                const visited = new Set();
                const width = imageData.width;
                const height = imageData.height;
                
                while (stack.length > 0) {
                    const {x, y} = stack.pop();
                    const key = `${x},${y}`;
                    
                    // Skip if already visited or out of bounds
                    if (visited.has(key) || x < 0 || x >= width || y < 0 || y >= height) {
                        continue;
                    }
                    
                    const currentColor = this.getPixelColor(imageData, x, y);
                    
                    // Skip if this pixel doesn't match the target color
                    if (!this.colorsEqual(currentColor, targetColor)) {
                        continue;
                    }
                    
                    // Mark as visited and fill the pixel
                    visited.add(key);
                    this.setPixelColor(imageData, x, y, fillColor);
                    
                    // Add neighboring pixels to stack
                    stack.push({x: x + 1, y: y});
                    stack.push({x: x - 1, y: y});
                    stack.push({x: x, y: y + 1});
                    stack.push({x: x, y: y - 1});
                }
            }

            getPixelColor(imageData, x, y) {
                // Ensure coordinates are integers and within bounds
                x = Math.floor(x);
                y = Math.floor(y);
                
                if (x < 0 || x >= imageData.width || y < 0 || y >= imageData.height) {
                    return {r: 0, g: 0, b: 0, a: 0}; // Return transparent for out of bounds
                }
                
                const index = (y * imageData.width + x) * 4;
                return {
                    r: imageData.data[index],
                    g: imageData.data[index + 1],
                    b: imageData.data[index + 2],
                    a: imageData.data[index + 3]
                };
            }

            setPixelColor(imageData, x, y, color) {
                // Ensure coordinates are integers and within bounds
                x = Math.floor(x);
                y = Math.floor(y);
                
                if (x < 0 || x >= imageData.width || y < 0 || y >= imageData.height) {
                    return; // Skip out of bounds pixels
                }
                
                const index = (y * imageData.width + x) * 4;
                imageData.data[index] = color.r;
                imageData.data[index + 1] = color.g;
                imageData.data[index + 2] = color.b;
                imageData.data[index + 3] = color.a;
            }

            hexToRgba(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return {r, g, b, a: 255};
            }

            colorsEqual(color1, color2) {
                // Allow for small differences due to anti-aliasing
                const tolerance = 5;
                return Math.abs(color1.r - color2.r) <= tolerance &&
                       Math.abs(color1.g - color2.g) <= tolerance &&
                       Math.abs(color1.b - color2.b) <= tolerance &&
                       Math.abs(color1.a - color2.a) <= tolerance;
            }

            saveState() {
                if (this.undoStack.length >= this.maxUndoSteps) {
                    this.undoStack.shift();
                }
                this.undoStack.push(this.canvas.toDataURL());
            }

            undo() {
                if (this.undoStack.length > 1) {
                    this.undoStack.pop(); // Remove current state
                    const previousState = this.undoStack[this.undoStack.length - 1];
                    const img = new Image();
                    img.onload = () => {
                        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                        this.ctx.drawImage(img, 0, 0);
                    };
                    img.src = previousState;
                }
            }

            clearCanvas() {
             //   if (confirm('Are you sure you want to clear your drawing? 🎨')) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.saveState();
           //     }
            }

            updateSizePreview() {
                const preview = document.getElementById('sizePreview');
                const label = document.getElementById('sizeLabel');
                
                if (preview && label) {
                    const size = Math.min(this.brushSize * 2, 60);
                    
                    preview.style.width = size + 'px';
                    preview.style.height = size + 'px';
                    label.textContent = `Size: ${this.brushSize}px`;
                }
            }

            updateCursor() {
                switch (this.currentTool) {
                    case 'brush':
                        this.canvas.style.cursor = 'crosshair';
                        break;
                    case 'eraser':
                        this.canvas.style.cursor = 'grab';
                        break;
                    case 'fill':
                        this.canvas.style.cursor = 'copy';
                        break;
                    default:
                        this.canvas.style.cursor = 'crosshair';
                }
            }
        }

        // Initialize the drawing pad when the page loads
        window.addEventListener('load', () => {
            new KidsDrawingPad();
        });
    </script>
</body>
</html>
