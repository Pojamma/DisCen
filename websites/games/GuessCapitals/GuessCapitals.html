<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Geography Guessing Game</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
		
		* {
			box-sizing: border-box;
		}
		
		body {
			background-image: url('background.jpg');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			background-attachment: fixed;
			background-color: #1a1a2e;
			color: #FFFFFF;
			font-family: 'Orbitron', Arial, sans-serif;
			text-align: center;
			font-size: 1.2em;
			padding: 1em;
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-start;
		}
		
		.game-container {
			background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(16, 16, 30, 0.95));
			border-radius: 20px;
			padding: 2em;
			margin: 1em;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
			backdrop-filter: blur(10px);
			border: 2px solid rgba(255, 255, 255, 0.1);
			max-width: 800px;
			width: 100%;
			animation: fadeIn 0.8s ease-in;
		}
		
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(30px); }
			to { opacity: 1; transform: translateY(0); }
		}
		
		h1 {
			font-size: 2.5em;
			font-weight: 900;
			margin-bottom: 0.5em;
			background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
			background-size: 300% 300%;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			animation: gradientShift 3s ease-in-out infinite;
			text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
		}
		
		@keyframes gradientShift {
			0%, 100% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
		}
		
		.controls-section {
			background: rgba(0, 0, 0, 0.4);
			border-radius: 15px;
			padding: 1.5em;
			margin: 1em 0;
			border: 1px solid rgba(255, 255, 255, 0.2);
		}
		
		select, button {
			font-family: 'Orbitron', Arial, sans-serif;
			font-size: 1em;
			margin: 0.5em;
			padding: 12px 24px;
			border: none;
			border-radius: 25px;
			cursor: pointer;
			transition: all 0.3s ease;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 1px;
		}
		
		select {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
			border: 2px solid transparent;
		}
		
		select:hover {
			transform: translateY(-3px);
			box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
			border: 2px solid rgba(255, 255, 255, 0.3);
		}
		
		select:focus {
			outline: none;
			box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5);
		}
		
		button {
			background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
			color: white;
			box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
			border: 2px solid transparent;
			position: relative;
			overflow: hidden;
		}
		
		button:hover {
			transform: translateY(-3px);
			box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
			background: linear-gradient(135deg, #ff8a80 0%, #ff5722 100%);
		}
		
		button:active {
			transform: translateY(-1px);
			box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
		}
		
		button::before {
			content: '';
			position: absolute;
			top: 0;
			left: -100%;
			width: 100%;
			height: 100%;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
			transition: left 0.6s;
		}
		
		button:hover::before {
			left: 100%;
		}
		
		.submit-btn {
			background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
			font-size: 1.1em;
			padding: 15px 30px;
		}
		
		.submit-btn:hover {
			background: linear-gradient(135deg, #26d0ce 0%, #1a9850 100%);
		}
		
		.reset-btn {
			background: linear-gradient(135deg, #ffa726 0%, #fb8c00 100%);
		}
		
		.reset-btn:hover {
			background: linear-gradient(135deg, #ffb74d 0%, #f57c00 100%);
		}
		
		.exit-btn {
			background: linear-gradient(135deg, #e57373 0%, #f44336 100%);
		}
		
		.exit-btn:hover {
			background: linear-gradient(135deg, #ef5350 0%, #d32f2f 100%);
		}
		
		#gameSection {
			background: rgba(0, 0, 0, 0.6);
			border-radius: 15px;
			padding: 2em;
			margin: 1.5em 0;
			border: 1px solid rgba(255, 255, 255, 0.2);
			min-height: 200px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}
		
		#gameSection p {
			font-size: 1.4em;
			font-weight: 700;
			margin-bottom: 1.5em;
			background: rgba(255, 255, 255, 0.1);
			padding: 1em;
			border-radius: 10px;
			border: 1px solid rgba(255, 255, 255, 0.2);
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
		}
		
		#statusLine {
			background: rgba(0, 0, 0, 0.7);
			border-radius: 10px;
			padding: 1em;
			margin: 1em 0;
			font-size: 1.1em;
			font-weight: 600;
			border: 1px solid rgba(255, 255, 255, 0.2);
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}
		
		.score-display {
			display: flex;
			justify-content: center;
			gap: 2em;
			margin-top: 1em;
		}
		
		.score-item {
			background: linear-gradient(135deg, rgba(76, 175, 80, 0.8), rgba(56, 142, 60, 0.8));
			padding: 0.8em 1.5em;
			border-radius: 20px;
			border: 2px solid rgba(255, 255, 255, 0.3);
			font-weight: 700;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}
		
		.score-item.incorrect {
			background: linear-gradient(135deg, rgba(244, 67, 54, 0.8), rgba(198, 40, 40, 0.8));
		}
		
		.pulse {
			animation: pulse 0.6s ease-in-out;
		}
		
		@keyframes pulse {
			0% { transform: scale(1); }
			50% { transform: scale(1.05); }
			100% { transform: scale(1); }
		}
		
		.feedback-message {
			font-size: 1.2em;
			font-weight: 700;
			padding: 1em;
			border-radius: 10px;
			margin: 1em 0;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
		}
		
		.feedback-correct {
			background: linear-gradient(135deg, rgba(76, 175, 80, 0.9), rgba(56, 142, 60, 0.9));
			border: 2px solid #4caf50;
			animation: pulse 0.6s ease-in-out;
		}
		
		.feedback-incorrect {
			background: linear-gradient(135deg, rgba(244, 67, 54, 0.9), rgba(198, 40, 40, 0.9));
			border: 2px solid #f44336;
			animation: pulse 0.6s ease-in-out;
		}
		
		@media (max-width: 768px) {
			body {
				font-size: 1em;
				padding: 0.5em;
			}
			
			h1 {
				font-size: 2em;
			}
			
			.game-container {
				padding: 1.5em;
				margin: 0.5em;
			}
			
			select, button {
				font-size: 0.9em;
				margin: 0.3em;
				padding: 10px 20px;
			}
			
			.score-display {
				flex-direction: column;
				gap: 1em;
			}
		}
	</style>
	<script>
		const statesAndCapitals = {
			'Alabama': 'Montgomery',
			'Alaska': 'Juneau',
			'Arizona': 'Phoenix',
			'Arkansas': 'Little Rock',
			'California': 'Sacramento',
			'Colorado': 'Denver',
			'Connecticut': 'Hartford',
			'Delaware': 'Dover',
			'Florida': 'Tallahassee',
			'Georgia': 'Atlanta',
			'Hawaii': 'Honolulu',
			'Idaho': 'Boise',
			'Illinois': 'Springfield',
			'Indiana': 'Indianapolis',
			'Iowa': 'Des Moines',
			'Kansas': 'Topeka',
			'Kentucky': 'Frankfort',
			'Louisiana': 'Baton Rouge',
			'Maine': 'Augusta',
			'Maryland': 'Annapolis',
			'Massachusetts': 'Boston',
			'Michigan': 'Lansing',
			'Minnesota': 'St. Paul',
			'Mississippi': 'Jackson',
			'Missouri': 'Jefferson City',
			'Montana': 'Helena',
			'Nebraska': 'Lincoln',
			'Nevada': 'Carson City',
			'New Hampshire': 'Concord',
			'New Jersey': 'Trenton',
			'New Mexico': 'Santa Fe',
			'New York': 'Albany',
			'North Carolina': 'Raleigh',
			'North Dakota': 'Bismarck',
			'Ohio': 'Columbus',
			'Oklahoma': 'Oklahoma City',
			'Oregon': 'Salem',
			'Pennsylvania': 'Harrisburg',
			'Rhode Island': 'Providence',
			'South Carolina': 'Columbia',
			'South Dakota': 'Pierre',
			'Tennessee': 'Nashville',
			'Texas': 'Austin',
			'Utah': 'Salt Lake City',
			'Vermont': 'Montpelier',
			'Virginia': 'Richmond',
			'Washington': 'Olympia',
			'West Virginia': 'Charleston',
			'Wisconsin': 'Madison',
			'Wyoming': 'Cheyenne'
		};

		const countriesAndCapitals = {
			'United States': 'Washington, D.C.',
			'Canada': 'Ottawa',
			'Mexico': 'Mexico City',
			'Brazil': 'Brasília',
			'United Kingdom': 'London',
			'France': 'Paris',
			'Germany': 'Berlin',
			'Italy': 'Rome',
			'Spain': 'Madrid',
			'Australia': 'Canberra',
			'India': 'New Delhi',
			'China': 'Beijing',
			'Japan': 'Tokyo',
			'Russia': 'Moscow',
			'South Korea': 'Seoul',
			'Argentina': 'Buenos Aires',
			'South Africa': 'Pretoria',
			'Egypt': 'Cairo',
			'Turkey': 'Ankara',
			'Saudi Arabia': 'Riyadh',
			'Sweden': 'Stockholm',
			'Norway': 'Oslo',
			'Finland': 'Helsinki',
			'Denmark': 'Copenhagen',
			'Netherlands': 'Amsterdam',
			'Belgium': 'Brussels',
			'Switzerland': 'Bern',
			'Austria': 'Vienna',
			'Poland': 'Warsaw',
			'Czech Republic': 'Prague',
			'Portugal': 'Lisbon',
			'Greece': 'Athens',
			'Hungary': 'Budapest',
			'Thailand': 'Bangkok',
			'Vietnam': 'Hanoi',
			'Indonesia': 'Jakarta',
			'Philippines': 'Manila',
			'Pakistan': 'Islamabad',
			'New Zealand': 'Wellington',
			'Nigeria': 'Abuja'
		};

		let mode = '';
		let correctGuesses = 0;
		let incorrectGuesses = 0;

		function playSound(soundId) {
			const audio = document.getElementById(soundId);
			if (audio) {
				audio.currentTime = 0;
				audio.play().catch(e => console.log('Audio play failed:', e));
			}
		}

		function setMode(selectedMode) {
			mode = selectedMode;
			document.getElementById('gameSection').innerHTML = '';
			document.getElementById('statusLine').innerHTML = '';
			if (mode === 'stateToCapital' || mode === 'capitalToState') {
				createStateGame();
			} else if (mode === 'countryToCapital' || mode === 'capitalToCountry') {
				createCountryGame();
			}
		}

		function createStateGame() {
			const states = Object.keys(statesAndCapitals).sort();
			const capitals = Object.values(statesAndCapitals).sort();
			const dropdown = document.createElement('select');
			dropdown.id = 'answerDropdown';

			let question;
			if (mode === 'stateToCapital') {
				question = states[Math.floor(Math.random() * states.length)];
				document.getElementById('gameSection').innerHTML = `<p>🏛️ What is the capital of <strong>${question}</strong>?</p>`;
				
				const defaultOption = document.createElement('option');
				defaultOption.value = '';
				defaultOption.textContent = '-- Select a Capital --';
				dropdown.appendChild(defaultOption);
				
				capitals.forEach(capital => {
					const option = document.createElement('option');
					option.value = capital;
					option.textContent = capital;
					dropdown.appendChild(option);
				});
			} else {
				question = capitals[Math.floor(Math.random() * capitals.length)];
				document.getElementById('gameSection').innerHTML = `<p>🗺️ Which state has the capital <strong>${question}</strong>?</p>`;
				
				const defaultOption = document.createElement('option');
				defaultOption.value = '';
				defaultOption.textContent = '-- Select a State --';
				dropdown.appendChild(defaultOption);
				
				states.forEach(state => {
					const option = document.createElement('option');
					option.value = state;
					option.textContent = state;
					dropdown.appendChild(option);
				});
			}
			document.getElementById('gameSection').appendChild(dropdown);
			const button = document.createElement('button');
			button.textContent = '🎯 Submit Answer';
			button.className = 'submit-btn';
			button.addEventListener('click', () => playSound('clickSound'));
			button.onclick = () => checkAnswer(question);
			document.getElementById('gameSection').appendChild(button);
		}

		function createCountryGame() {
			const countries = Object.keys(countriesAndCapitals).sort();
			const capitals = Object.values(countriesAndCapitals).sort();
			const dropdown = document.createElement('select');
			dropdown.id = 'answerDropdown';

			let question;
			if (mode === 'countryToCapital') {
				question = countries[Math.floor(Math.random() * countries.length)];
				document.getElementById('gameSection').innerHTML = `<p>🌍 What is the capital of <strong>${question}</strong>?</p>`;
				
				const defaultOption = document.createElement('option');
				defaultOption.value = '';
				defaultOption.textContent = '-- Select a Capital --';
				dropdown.appendChild(defaultOption);
				
				capitals.forEach(capital => {
					const option = document.createElement('option');
					option.value = capital;
					option.textContent = capital;
					dropdown.appendChild(option);
				});
			} else {
				question = capitals[Math.floor(Math.random() * capitals.length)];
				document.getElementById('gameSection').innerHTML = `<p>🌎 Which country has the capital <strong>${question}</strong>?</p>`;
				
				const defaultOption = document.createElement('option');
				defaultOption.value = '';
				defaultOption.textContent = '-- Select a Country --';
				dropdown.appendChild(defaultOption);
				
				countries.forEach(country => {
					const option = document.createElement('option');
					option.value = country;
					option.textContent = country;
					dropdown.appendChild(option);
				});
			}
			document.getElementById('gameSection').appendChild(dropdown);
			const button = document.createElement('button');
			button.textContent = '🎯 Submit Answer';
			button.className = 'submit-btn';
			button.addEventListener('click', () => playSound('clickSound'));
			button.onclick = () => checkAnswer(question);
			document.getElementById('gameSection').appendChild(button);
		}

		function checkAnswer(question) {
			const answer = document.getElementById('answerDropdown').value;
			
			if (answer === '') {
				alert('Please select an answer before submitting!');
				return;
			}
			
			let correctAnswer;
			if (mode === 'stateToCapital') {
				correctAnswer = statesAndCapitals[question];
			} else if (mode === 'capitalToState') {
				correctAnswer = Object.keys(statesAndCapitals).find(state => statesAndCapitals[state] === question);
			} else if (mode === 'countryToCapital') {
				correctAnswer = countriesAndCapitals[question];
			} else if (mode === 'capitalToCountry') {
				correctAnswer = Object.keys(countriesAndCapitals).find(country => countriesAndCapitals[country] === question);
			}

			const statusLine = document.getElementById('statusLine');
			
			if (answer === correctAnswer) {
				correctGuesses++;
				playSound('winSound');
				statusLine.innerHTML = `
					<div class="feedback-message feedback-correct">
						🎉 Excellent! You got it right!
					</div>
					<div class="score-display">
						<div class="score-item">✅ Correct: ${correctGuesses}</div>
						<div class="score-item incorrect">❌ Incorrect: ${incorrectGuesses}</div>
					</div>
				`;
			} else {
				incorrectGuesses++;
				playSound('loseSound');
				statusLine.innerHTML = `
					<div class="feedback-message feedback-incorrect">
						😔 Not quite! The correct answer for "${question}" is "${correctAnswer}".
					</div>
					<div class="score-display">
						<div class="score-item">✅ Correct: ${correctGuesses}</div>
						<div class="score-item incorrect">❌ Incorrect: ${incorrectGuesses}</div>
					</div>
				`;
			}
			
			statusLine.classList.add('pulse');
			setTimeout(() => statusLine.classList.remove('pulse'), 600);
			
			setTimeout(() => {
				if (mode === 'stateToCapital' || mode === 'capitalToState') {
					createStateGame();
				} else if (mode === 'countryToCapital' || mode === 'capitalToCountry') {
					createCountryGame();
				}
			}, 2500);
		}

		function resetGame() {
			correctGuesses = 0;
			incorrectGuesses = 0;
			const statusLine = document.getElementById('statusLine');
			statusLine.innerHTML = `
				<div class="feedback-message" style="background: linear-gradient(135deg, rgba(33, 150, 243, 0.9), rgba(21, 101, 192, 0.9)); border: 2px solid #2196f3;">
					🚀 New game started! Good luck!
				</div>
				<div class="score-display">
					<div class="score-item">✅ Correct: 0</div>
					<div class="score-item incorrect">❌ Incorrect: 0</div>
				</div>
			`;
			setMode(mode);
		}
	</script>
	<audio id="clickSound" src="click.wav"></audio>
	<audio id="winSound" src="win.mp3"></audio>
	<audio id="loseSound" src="lose.mp3"></audio>
</head>
<body>
	<div class="game-container">
		<h1>🌟 Geography Guessing Game 🌟</h1>
		
		<div class="controls-section">
			<select id="modeSelect" onchange="playSound('clickSound'); setMode(this.value)">
				<option value="">🎮 Select a Game Mode</option>
				<option value="stateToCapital">🏛️ Guess Capital from State</option>
				<option value="capitalToState">🗺️ Guess State from Capital</option>
				<option value="countryToCapital">🌍 Guess Capital from Country</option>
				<option value="capitalToCountry">🌎 Guess Country from Capital</option>
			</select>
			
			<div style="margin-top: 1em;">
				<button class="reset-btn" onclick="playSound('clickSound'); resetGame()">🔄 New Game</button>
				<button class="exit-btn" onclick="playSound('clickSound'); window.close()">🚪 Exit</button>
			</div>
		</div>
		
		<div id="statusLine"></div>
		<div id="gameSection"></div>
	</div>
</body>
</html>
