<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f8ff;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
        }
        #gameCanvas {
            border: 2px solid #000;
            background-color: #add8e6;
        }
        #newGameBtn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: #ffb6c1;
            border: none;
            cursor: pointer;
        }
        .score {
            font-size: 24px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Ping Pong</h1>
    <div class="score">
        Player 1: <span id="score1">0</span> - Player 2: <span id="score2">0</span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <button id="newGameBtn">New Game</button>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player1Y = canvas.height / 2 - 50;
        let player2Y = canvas.height / 2 - 50;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 2;
        let ballSpeedY = 2;
        let isOnePlayer = true;
        let score1 = 0;
        let score2 = 0;
        const paddleWidth = 30;
        const paddleHeight = 100;

        document.getElementById('newGameBtn').addEventListener('click', startGame);

        canvas.addEventListener('touchmove', (event) => {
            const touch = event.touches[0];
            player1Y = touch.clientY - canvas.getBoundingClientRect().top - paddleHeight / 2;
        });

        function startGame() {
            resetGame();
            score1 = 0;
            score2 = 0;
            updateScore();
            isOnePlayer = confirm('Play with Computer? OK for Yes, Cancel for No.');
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            moveEverything();
            drawEverything();
            requestAnimationFrame(gameLoop);
        }

        function moveEverything() {
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            if (ballY <= 0 || ballY >= canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            if (ballX <= paddleWidth) {
                if (ballY > player1Y && ballY < player1Y + paddleHeight) {
                    ballSpeedX = -ballSpeedX;
                    ballSpeedX *= 1.1; // Slow speed increase
                    ballSpeedY *= 1.1; // Slow speed increase
                } else {
                    score2++;
                    updateScore();
                    resetGame();
                }
            }

            if (ballX >= canvas.width - paddleWidth) {
                if (ballY > player2Y && ballY < player2Y + paddleHeight) {
                    ballSpeedX = -ballSpeedX;
                    ballSpeedX *= 1.1; // Slow speed increase
                    ballSpeedY *= 1.1; // Slow speed increase
                } else {
                    score1++;
                    updateScore();
                    resetGame();
                }
            }

            if (isOnePlayer) {
                player2Y = ballY - paddleHeight / 2;
            }
        }

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f';
            ctx.fillRect(0, player1Y, paddleWidth, paddleHeight);
            ctx.fillStyle = '#f00';
            ctx.fillRect(canvas.width - paddleWidth, player2Y, paddleWidth, paddleHeight);
            ctx.beginPath();
            ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
        }

        function resetGame() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = 2;
            ballSpeedY = 2;
        }

        function updateScore() {
            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
        }

        startGame();
    </script>
</body>
</html>
