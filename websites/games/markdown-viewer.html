<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Text Formatter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .input-group {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .input-group:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            border-color: #667eea;
        }
        
        .input-group h3 {
            margin-top: 0;
            color: #333;
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        .file-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-input-display {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border: 2px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            color: #666;
        }
        
        .file-input-display:hover {
            border-color: #667eea;
            background: #f0f3ff;
            color: #333;
        }
        
        .file-info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 140px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3);
        }
        
        .output-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 2px solid #e0e0e0;
        }
        
        .output-section h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            font-size: 1.4em;
        }
        
        .output {
            min-height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            background: #fdfdfd;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        
        .output h1, .output h2, .output h3, .output h4, .output h5, .output h6 {
            color: #333;
            margin-top: 0;
        }
        
        .output code {
            background: #f1f3f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        
        .output pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border-left: 4px solid #667eea;
        }
        
        .output blockquote {
            border-left: 4px solid #ddd;
            margin: 0;
            padding-left: 20px;
            color: #666;
            font-style: italic;
        }
        
        .output table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }
        
        .output th, .output td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        .output th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 40px 20px;
        }
        
        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Markdown Text Formatter</h1>
        
        <div class="input-section">
            <div class="input-group">
                <h3>✏️ Text Input</h3>
                <textarea id="textInput" placeholder="# Welcome to Markdown Formatter!

Type your markdown here...

## Features
- **Bold text**
- *Italic text*
- `Code snippets`
- Lists and more!

> This is a blockquote

### Code Block
```javascript
console.log('Hello, World!');
```

[Links work too](https://example.com)"></textarea>
            </div>
            
            <div class="input-group">
                <h3>📁 File Upload</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" class="file-input" accept=".md,.txt,.markdown">
                    <label for="fileInput" class="file-input-display">
                        📎 Click to select a markdown file<br>
                        <small>or drag and drop here</small>
                    </label>
                </div>
                <div class="file-info" id="fileInfo"></div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-primary" onclick="displayMarkdown()">🚀 Display Formatted</button>
            <button class="btn-secondary" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
            <button class="btn-success" onclick="saveAsHTML()">💾 Save As HTML</button>
        </div>
        
        <div class="output-section">
            <h3>📖 Formatted Output</h3>
            <div class="output" id="output">
                <div class="empty-state">
                    Click "Display Formatted" to see your markdown rendered here
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMarkdown = '';
        
        // File input handling
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const textInput = document.getElementById('textInput');
        
        fileInput.addEventListener('change', handleFileSelect);
        
        // Drag and drop functionality
        const fileInputDisplay = document.querySelector('.file-input-display');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileInputDisplay.addEventListener(eventName, preventDefaults, false);
        });
        
        ['dragenter', 'dragover'].forEach(eventName => {
            fileInputDisplay.addEventListener(eventName, highlight, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            fileInputDisplay.addEventListener(eventName, unhighlight, false);
        });
        
        fileInputDisplay.addEventListener('drop', handleDrop, false);
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        function highlight(e) {
            fileInputDisplay.style.borderColor = '#667eea';
            fileInputDisplay.style.background = '#f0f3ff';
        }
        
        function unhighlight(e) {
            fileInputDisplay.style.borderColor = '#ccc';
            fileInputDisplay.style.background = '#f8f9fa';
        }
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }
        
        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        }
        
        function handleFile(file) {
            fileInfo.textContent = `Selected: ${file.name} (${formatFileSize(file.size)})`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                textInput.value = e.target.result;
                showToast('File loaded successfully!');
            };
            reader.readAsText(file);
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function displayMarkdown() {
            const markdownText = textInput.value.trim();
            
            if (!markdownText) {
                showToast('Please enter some markdown text first!', 'error');
                return;
            }
            
            try {
                currentMarkdown = markdownText;
                const html = marked.parse(markdownText);
                document.getElementById('output').innerHTML = html;
                showToast('Markdown formatted successfully!');
            } catch (error) {
                showToast('Error formatting markdown: ' + error.message, 'error');
                console.error('Markdown parsing error:', error);
            }
        }
        
        function copyToClipboard() {
            const output = document.getElementById('output');
            
            if (!currentMarkdown) {
                showToast('Please format some markdown first!', 'error');
                return;
            }
            
            const htmlContent = output.innerHTML;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                // Try to copy HTML first, then fallback to text
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const data = [new ClipboardItem({ 'text/html': blob })];
                
                navigator.clipboard.write(data).then(() => {
                    showToast('HTML copied to clipboard!');
                }).catch(() => {
                    // Fallback to plain text
                    navigator.clipboard.writeText(output.textContent).then(() => {
                        showToast('Text copied to clipboard!');
                    }).catch(() => {
                        fallbackCopyToClipboard(output.textContent);
                    });
                });
            } else {
                fallbackCopyToClipboard(output.textContent);
            }
        }
        
        function fallbackCopyToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('Text copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy to clipboard', 'error');
            }
            
            document.body.removeChild(textArea);
        }
        
        function saveAsHTML() {
            const output = document.getElementById('output');
            
            if (!currentMarkdown) {
                showToast('Please format some markdown first!', 'error');
                return;
            }
            
            const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatted Markdown Document</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1, h2, h3, h4, h5, h6 { color: #333; margin-top: 0; }
        code {
            background: #f1f3f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Monaco, Menlo, 'Ubuntu Mono', monospace;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border-left: 4px solid #667eea;
        }
        blockquote {
            border-left: 4px solid #ddd;
            margin: 0;
            padding-left: 20px;
            color: #666;
            font-style: italic;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
    </style>
</head>
<body>
${output.innerHTML}
</body>
</html>`;
            
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = 'formatted-markdown.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('HTML file saved successfully!');
        }
        
        function showToast(message, type = 'success') {
            // Remove existing toast if any
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            
            if (type === 'error') {
                toast.style.background = '#dc3545';
            }
            
            document.body.appendChild(toast);
            
            // Show toast
            setTimeout(() => {
                toast.classList.add('show');
            }, 100);
            
            // Hide toast after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        document.body.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }
        
        // Initialize with sample content display
        window.addEventListener('load', function() {
            // Small delay to ensure marked.js is loaded
            setTimeout(displayMarkdown, 100);
        });
    </script>
</body>
</html>
