# /etc/nginx/conf.d/discen.conf - DisCen (Distraction Central)

# HTTPS server - main configuration
server {
    server_name distractioncentral.duckdns.org;

    # SSL managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/distractioncentral.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/distractioncentral.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Set the document root
    root /home/opc/DisCen/websites/main/public;
    index index.html index.htm;

    # ACME challenge exception (must be before hidden files deny)
    location ^~ /.well-known/acme-challenge/ {
        root /home/opc/DisCen/websites/main/public;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~* \.(bak|backup|old|orig|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Main location block
    location / {
        try_files $uri $uri/ =404;
    }

    # Games directory
    location /games/ {
        alias /home/opc/DisCen/websites/games/;
        try_files $uri $uri/ =404;
    }

    location /games/WordSearchGPT/ {
        alias /home/opc/DisCen/websites/games/WordSearchGPT/;
        try_files $uri $uri/ =404;
    }

    location /games/GuessCapitals/ {
        alias /home/opc/DisCen/websites/games/GuessCapitals/;
        try_files $uri $uri/ =404;
    }

    location /games/Wordle/ {
        alias /home/opc/DisCen/websites/games/Wordle/;
        try_files $uri $uri/ =404;
    }

    location /games/Hangman_Windsurf/ {
        alias /home/opc/DisCen/websites/games/Hangman_Windsurf/;
        try_files $uri $uri/ =404;
    }

    # Utility directory
    location /utility/ {
        alias /home/opc/DisCen/websites/utility/;
        try_files $uri $uri/ =404;
    }

    # EJ-EV project locations
    location /EJ-EV/ {
        alias /home/opc/DisCen/websites/EJ-EV/;
        try_files $uri $uri/ =404;
    }

    location /EJ-EV/Scribble/ {
        alias /home/opc/DisCen/websites/EJ-EV/Scribble/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/AlphabetSearch/ {
        alias /home/opc/DisCen/websites/EJ-EV/AlphabetSearch/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/AnimalSoundsMatch/ {
        alias /home/opc/DisCen/websites/EJ-EV/AnimalSoundsMatch/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/Bubbles/ {
        alias /home/opc/DisCen/websites/EJ-EV/Bubbles/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/Maze/ {
        alias /home/opc/DisCen/websites/EJ-EV/Maze/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/Trace/ {
        alias /home/opc/DisCen/websites/EJ-EV/Trace/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    location /EJ-EV/speakText/ {
        alias /home/opc/DisCen/websites/EJ-EV/speakText/;
        try_files $uri $uri/ =404;

        location ~ \.html$ {
            try_files $uri =404;
        }
    }

    # Static assets with caching
    location /shared/ {
        alias /home/opc/DisCen/shared/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    # Logs
    error_log /var/log/nginx/discen_error.log;
    access_log /var/log/nginx/discen_access.log;
}

# HTTP server - redirects to HTTPS
server {
    if ($host = distractioncentral.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name distractioncentral.duckdns.org 129.146.103.78;
    return 404; # managed by Certbot
}
